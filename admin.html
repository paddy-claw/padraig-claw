<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | OpenClaw Ireland</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --deep: #050508;
            --mid: #0f0f1a;
            --light: #1a1a2e;
            --accent: #FF4D4D;
            --text: #e0e0e0;
            --text-dim: #888;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--deep);
            color: var(--text);
            min-height: 100vh;
            padding: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid rgba(255, 77, 77, 0.3);
        }
        .logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .logo::before {
            content: '🦞 ';
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            max-width: 800px;
            margin: 0 auto 40px;
        }
        .stat-card {
            background: var(--mid);
            border: 1px solid rgba(255, 77, 77, 0.2);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        .stat-value {
            font-family: 'Syncopate', sans-serif;
            font-size: 2.5rem;
            color: var(--accent);
        }
        .section {
            max-width: 800px;
            margin: 0 auto 40px;
        }
        .section-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 77, 77, 0.3);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
        }
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .auth-prompt {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .auth-input {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 77, 77, 0.3);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        .auth-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .auth-btn {
            padding: 16px 32px;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .auth-btn:hover {
            background: #ff6666;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-prompt" id="authPrompt">
        <div class="logo">Admin</div>
        <p style="color: var(--text-dim); margin-bottom: 24px;">Enter admin token to view stats</p>
        <input type="password" id="authToken" class="auth-input" placeholder="Admin token">
        <br>
        <button class="auth-btn" onclick="authenticate()">Access Dashboard</button>
        <p id="authError" style="color: #ef4444; margin-top: 16px; display: none;">Invalid token</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="header">
            <div class="logo">Admin Dashboard</div>
            <p class="subtitle">OpenClaw Ireland — System Overview</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Newsletter Subscribers</div>
                <div class="stat-value" id="subscriberCount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">API Status</div>
                <div class="stat-value" id="apiStatus" style="font-size: 1.2rem; margin-top: 12px;">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Activity</div>
                <div class="stat-value" id="lastActivity" style="font-size: 1.2rem; margin-top: 12px;">-</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Quick Links</div>
            <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                <a href="/" style="color: var(--accent);">← Back to Website</a>
                <a href="https://plausible.io/openclaw.ie" target="_blank" style="color: var(--accent);">Analytics →</a>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="#" class="back-link" onclick="logout()">Logout</a>
        </div>
    </div>

    <script>
        const ADMIN_TOKEN_KEY = 'padraig_admin_token';
        
        // Check for stored token on load
        const storedToken = localStorage.getItem(ADMIN_TOKEN_KEY);
        if (storedToken) {
            showDashboard();
            loadStats(storedToken);
        }

        function authenticate() {
            const token = document.getElementById('authToken').value.trim();
            if (!token) {
                document.getElementById('authError').style.display = 'block';
                return;
            }
            
            localStorage.setItem(ADMIN_TOKEN_KEY, token);
            showDashboard();
            loadStats(token);
        }

        function showDashboard() {
            document.getElementById('authPrompt').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem(ADMIN_TOKEN_KEY);
            location.reload();
        }

        async function loadStats(token) {
            try {
                // Load health status
                const healthRes = await fetch('/api/health');
                const health = await healthRes.json();
                
                document.getElementById('apiStatus').textContent = health.status || 'unknown';
                document.getElementById('apiStatus').style.color = health.status === 'healthy' ? '#22c55e' : '#ef4444';
                
                if (health.checks && health.checks.lastActivity) {
                    const lastActive = new Date(health.checks.lastActivity);
                    const timeAgo = getTimeAgo(lastActive);
                    document.getElementById('lastActivity').textContent = timeAgo;
                } else {
                    document.getElementById('lastActivity').textContent = 'No data';
                }

                // Note: Subscriber count would require a secure endpoint
                // For now, show placeholder or implement if needed
                document.getElementById('subscriberCount').textContent = '?';
                
            } catch (error) {
                console.error('Failed to load stats:', error);
                document.getElementById('apiStatus').textContent = 'error';
                document.getElementById('apiStatus').style.color = '#ef4444';
            }
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }
    </script>
</body>
</html>
